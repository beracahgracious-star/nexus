<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus · Sign up</title>
  <!-- Google Font & minimal reset -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f7ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 1.5rem;
    }

    .card {
      background: #ffffff;
      max-width: 480px;
      width: 100%;
      padding: 2.5rem 2.2rem;
      border-radius: 40px;
      box-shadow: 0 20px 40px -12px rgba(0, 40, 80, 0.25),
                  0 8px 24px -6px rgba(0, 60, 120, 0.08);
      transition: transform 0.2s ease;
      border: 1px solid rgba(45, 122, 255, 0.15);
      backdrop-filter: blur(2px);
    }

    .card:hover {
      transform: translateY(-4px);
    }

    /* ----- NEXUS brand & blue/white theme ----- */
    .brand {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-bottom: 0.2rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #0b2b4a;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .nexus-badge {
      background: #1a5bbf;
      color: white;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
      letter-spacing: 0.5px;
      background: #0d4a9e;
      box-shadow: 0 2px 6px rgba(25, 80, 200, 0.3);
      margin-left: 0.2rem;
    }

    .subhead {
      color: #1f4b7a;
      font-size: 0.95rem;
      margin-bottom: 2rem;
      border-left: 4px solid #2d7aff;
      padding-left: 1rem;
      background: #e9f2fe;
      border-radius: 0 16px 16px 0;
      line-height: 1.4;
      padding: 0.6rem 1rem;
      font-weight: 450;
    }

    .subhead i {
      font-style: normal;
      background: #d4e6ff;
      padding: 0.1rem 0.7rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #0d4a9e;
      margin-left: 0.25rem;
    }

    .form-group {
      margin-bottom: 1.4rem;
    }

    label {
      display: block;
      font-weight: 500;
      font-size: 0.85rem;
      letter-spacing: 0.01em;
      color: #1a3d61;
      margin-bottom: 0.3rem;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      background: #f2f8ff;
      border-radius: 60px;
      padding: 0.1rem 0.1rem 0.1rem 1.2rem;
      transition: 0.2s;
      border: 1.5px solid transparent;
    }

    .input-wrap:focus-within {
      background: #ffffff;
      border-color: #2d7aff;
      box-shadow: 0 0 0 4px rgba(45, 122, 255, 0.15);
    }

    .input-wrap i {
      color: #2d7aff;
      font-style: normal;
      font-weight: 400;
      font-size: 1rem;
      margin-right: 0.5rem;
      opacity: 0.8;
    }

    .input-wrap input {
      width: 100%;
      padding: 0.9rem 0.9rem 0.9rem 0;
      border: none;
      background: transparent;
      font-size: 0.95rem;
      font-family: inherit;
      color: #0b1e33;
      outline: none;
    }

    .input-wrap input::placeholder {
      color: #8aafd0;
      font-weight: 400;
      font-size: 0.9rem;
    }

    .input-wrap .suffix {
      background: #dce8fa;
      padding: 0.35rem 1.1rem;
      border-radius: 60px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #0d4a9e;
      white-space: nowrap;
      margin-right: 0.2rem;
    }

    .password-hint {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.25rem;
      font-size: 0.75rem;
      color: #3d71a5;
      padding-right: 0.5rem;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin: 1.6rem 0 1.8rem;
    }

    .checkbox-group input {
      width: 1.1rem;
      height: 1.1rem;
      accent-color: #2d7aff;
      border-radius: 6px;
      cursor: pointer;
    }

    .checkbox-group label {
      font-size: 0.9rem;
      font-weight: 450;
      color: #1a3d61;
      cursor: pointer;
      margin-bottom: 0;
    }

    .checkbox-group a {
      color: #1a5bbf;
      text-decoration: none;
      font-weight: 500;
    }

    .checkbox-group a:hover {
      text-decoration: underline;
    }

    .btn-primary {
      background: #0d3d7a;
      color: white;
      border: none;
      font-weight: 600;
      font-size: 1rem;
      padding: 0.9rem 1.8rem;
      border-radius: 80px;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: #0a3470;
      box-shadow: 0 8px 18px -6px rgba(13, 61, 122, 0.35);
      margin-top: 0.3rem;
    }

    .btn-primary:hover {
      background: #104a8a;
      transform: scale(1.01);
      box-shadow: 0 10px 22px -6px #0a2d5a80;
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 2rem;
      font-size: 0.85rem;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: #2d6aa0;
      text-decoration: none;
      font-weight: 450;
      border-bottom: 1px dashed transparent;
      transition: 0.1s;
    }

    .footer-links a:hover {
      border-bottom-color: #2d7aff;
      color: #0b2b4a;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin: 1.5rem 0 0.8rem;
      color: #5a8ab8;
      font-size: 0.8rem;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: #c6ddf5;
    }

    .social-row {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin-top: 0.5rem;
    }

    .social-btn {
      background: #f2f8ff;
      border: 1px solid #c6ddf5;
      border-radius: 60px;
      padding: 0.5rem 1.2rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: #1a4b7a;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: default;
      transition: 0.1s;
      font-family: inherit;
    }

    .social-btn:hover {
      background: #e4effb;
      border-color: #8fb7e0;
    }

    .live-badge {
      display: inline-block;
      background: #1a7a4a;
      color: white;
      font-size: 0.6rem;
      font-weight: 600;
      padding: 0.15rem 0.7rem;
      border-radius: 40px;
      letter-spacing: 0.3px;
      margin-left: 0.4rem;
      vertical-align: middle;
      background: #0f6b3a;
    }

    /* feedback */
    #formFeedback {
      margin-top: 1.2rem;
      font-size: 0.9rem;
      text-align: center;
      min-height: 1.6rem;
      border-radius: 60px;
      padding: 0.3rem 0.8rem;
      display: none;
      font-weight: 500;
    }

    /* redirect info */
    .redirect-notice {
      margin-top: 1rem;
      font-size: 0.8rem;
      text-align: center;
      color: #2d6aa0;
      background: #e9f2fe;
      padding: 0.3rem 0.8rem;
      border-radius: 60px;
      display: inline-block;
      width: 100%;
    }

    @media (max-width: 480px) {
      .card { padding: 1.8rem 1.2rem; }
      h1 { font-size: 1.7rem; }
    }
  </style>
</head>
<body>

<div class="card">
  <!-- Nexus brand -->
  <div class="brand">
    <h1>
      <span>🔷</span> Nexus
      <span class="nexus-badge">beta</span>
    </h1>
  </div>
  <div class="subhead">
    ⚡ Join the network · <i>blue & white</i>
  </div>

  <!-- Sign up form -->
  <form id="signupForm" onsubmit="return handleSignUp(event)">
    <!-- Username -->
    <div class="form-group">
      <label for="username">Username</label>
      <div class="input-wrap">
        <i>@</i>
        <input type="text" id="username" placeholder="choose a unique handle" required>
      </div>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label for="email">Email address</label>
      <div class="input-wrap">
        <i>✉</i>
        <input type="email" id="email" placeholder="you@nexus.com" required>
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <i>🔒</i>
        <input type="password" id="password" placeholder="••••••••" minlength="6" required>
        <span class="suffix">min 6</span>
      </div>
      <div class="password-hint">use at least 6 characters</div>
    </div>

    <!-- Terms & conditions -->
    <div class="checkbox-group">
      <input type="checkbox" id="terms" required>
      <label for="terms">
        I agree to the <a href="#" onclick="return false;">Terms of Service</a> and <a href="#" onclick="return false;">Privacy Policy</a>
      </label>
    </div>

    <!-- Submit -->
    <button type="submit" class="btn-primary">
      <span>→</span> Create Nexus account
    </button>
  </form>

  <!-- Divider & social (demo) -->
  <div class="divider">
    <span class="divider-line"></span>
    <span>or continue with</span>
    <span class="divider-line"></span>
  </div>
  <div class="social-row">
    <span class="social-btn"><i>🔵</i> Google</span>
    <span class="social-btn"><i>⚫</i> GitHub</span>
    <span class="social-btn"><i>🔷</i> Twitter</span>
  </div>

  <!-- footer links -->
  <div class="footer-links">
    <a href="#" onclick="return false;">Already a member?</a>
    <!-- "Sign in" link now points to login page (redirect) -->
    <a href="#" id="signInLink">Sign in</a>
    <a href="#" onclick="return false;">Help</a>
  </div>

  <!-- feedback message (hidden by default) -->
  <div id="formFeedback"></div>

  <!-- small redirect notice -->
  <div class="redirect-notice">
    ⏩ After sign-up, you'll be redirected to the login page
  </div>
</div>

<script>
  // ===== REDIRECT TO LOGIN PAGE =====
  // This function simulates a redirect to a login page.
  // In a real app, you would use window.location.href = "login.html";
  function redirectToLogin() {
    // For demo, we show an alert and then redirect to a mock login page.
    // The login page is represented by a simple HTML snippet.
    // In production, replace with your actual login URL.
    alert('✅ Sign-up successful! Redirecting to login page...');
    
    // Simulate redirect by replacing the current page content with a login mock.
    // This is just for demonstration — in a real app you would navigate to login.html
    const loginHTML = `
      <!DOCTYPE html>
      <html>
      <head><title>Nexus · Login</title>
      <style>
        body { font-family: 'Inter', sans-serif; background: #f0f7ff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 3rem 2.5rem; border-radius: 40px; box-shadow: 0 20px 40px -12px rgba(0,40,80,0.25); max-width: 400px; width: 100%; text-align: center; }
        h1 { color: #0b2b4a; }
        .input-group { margin: 1.5rem 0; }
        input { width: 100%; padding: 0.8rem; border: 1.5px solid #c6ddf5; border-radius: 60px; font-size: 0.95rem; }
        button { background: #0a3470; color: white; border: none; padding: 0.8rem 2rem; border-radius: 60px; font-weight: 600; cursor: pointer; width: 100%; }
        .back-link { display: block; margin-top: 1.5rem; color: #2d6aa0; }
      </style>
      </head>
      <body>
        <div class="login-card">
          <h1>🔷 Nexus · Login</h1>
          <p style="color: #1f4b7a; margin-bottom: 1.5rem;">Sign in to your account</p>
          <div class="input-group"><input type="text" placeholder="Username or email"></div>
          <div class="input-group"><input type="password" placeholder="Password"></div>
          <button>Sign in</button>
          <a href="#" onclick="window.location.reload();" class="back-link">← Back to sign up</a>
          <p style="margin-top: 1rem; font-size: 0.8rem; color: #5a8ab8;">(demo login page — redirect works)</p>
        </div>
      </body>
      </html>
    `;
    // Replace the current document with the login page mock
    document.open();
    document.write(loginHTML);
    document.close();
  }

  // ===== HANDLE SIGN UP =====
  function handleSignUp(event) {
    event.preventDefault();   // prevent actual form submit

    // Get values
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const termsChecked = document.getElementById('terms').checked;

    const feedback = document.getElementById('formFeedback');

    // Reset style
    feedback.style.display = 'block';
    feedback.style.background = '#e9f2fe';
    feedback.style.color = '#0b2b4a';

    // Validation
    if (!username || username.length < 2) {
      feedback.style.background = '#fee9e7';
      feedback.style.color = '#a1302a';
      feedback.textContent = '❌ Please enter a valid username (min 2 characters).';
      return false;
    }

    if (!email || !email.includes('@') || !email.includes('.')) {
      feedback.style.background = '#fee9e7';
      feedback.style.color = '#a1302a';
      feedback.textContent = '❌ Please enter a valid email address.';
      return false;
    }

    if (!password || password.length < 6) {
      feedback.style.background = '#fee9e7';
      feedback.style.color = '#a1302a';
      feedback.textContent = '❌ Password must be at least 6 characters.';
      return false;
    }

    if (!termsChecked) {
      feedback.style.background = '#fee9e7';
      feedback.style.color = '#a1302a';
      feedback.textContent = '⚠️ You must agree to the Terms & Privacy Policy.';
      return false;
    }

    // ✅ SUCCESS — show feedback, then redirect
    feedback.style.background = '#d4e6ff';
    feedback.style.color = '#08396e';
    feedback.textContent = `✅ Welcome, ${username}! Redirecting to login...`;

    // Log data (for development)
    console.log('Nexus sign up:', { username, email, password: '[hidden]', terms: true });

    // Redirect after a short delay so user sees the success message
    setTimeout(redirectToLogin, 1200);

    return false;
  }

  // Also allow the "Sign in" link to trigger redirect directly (for demo)
  document.getElementById('signInLink').addEventListener('click', function(e) {
    e.preventDefault();
    // Simulate redirect to login page
    alert('🔷 Redirecting to login page...');
    // Use the same redirect function
    redirectToLogin();
  });
</script>

<!-- Nexus · blue & white theme · with redirect to login page -->
</body>
</html>
