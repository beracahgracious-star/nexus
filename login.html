<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus · Login</title>
    <!-- Google Font & minimal reset -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f7ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 1.5rem;
        }

        .card {
            background: #ffffff;
            max-width: 440px;
            width: 100%;
            padding: 2.5rem 2.2rem;
            border-radius: 40px;
            box-shadow: 0 20px 40px -12px rgba(0, 40, 80, 0.25),
                        0 8px 24px -6px rgba(0, 60, 120, 0.08);
            transition: transform 0.2s ease;
            border: 1px solid rgba(45, 122, 255, 0.15);
        }

        .card:hover {
            transform: translateY(-4px);
        }

        /* ----- NEXUS brand (blue/white) ----- */
        .brand {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-bottom: 0.2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #0b2b4a;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .nexus-badge {
            background: #0d4a9e;
            color: white;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 6px rgba(25, 80, 200, 0.3);
            margin-left: 0.2rem;
        }

        .subhead {
            color: #1f4b7a;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            border-left: 4px solid #2d7aff;
            padding-left: 1rem;
            background: #e9f2fe;
            border-radius: 0 16px 16px 0;
            line-height: 1.4;
            padding: 0.6rem 1rem;
            font-weight: 450;
        }

        .subhead i {
            font-style: normal;
            background: #d4e6ff;
            padding: 0.1rem 0.7rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #0d4a9e;
            margin-left: 0.25rem;
        }

        .form-group {
            margin-bottom: 1.4rem;
        }

        label {
            display: block;
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 0.01em;
            color: #1a3d61;
            margin-bottom: 0.3rem;
        }

        .input-wrap {
            display: flex;
            align-items: center;
            background: #f2f8ff;
            border-radius: 60px;
            padding: 0.1rem 0.1rem 0.1rem 1.2rem;
            transition: 0.2s;
            border: 1.5px solid transparent;
        }

        .input-wrap:focus-within {
            background: #ffffff;
            border-color: #2d7aff;
            box-shadow: 0 0 0 4px rgba(45, 122, 255, 0.15);
        }

        .input-wrap i {
            color: #2d7aff;
            font-style: normal;
            font-weight: 400;
            font-size: 1rem;
            margin-right: 0.5rem;
            opacity: 0.8;
        }

        .input-wrap input {
            width: 100%;
            padding: 0.9rem 0.9rem 0.9rem 0;
            border: none;
            background: transparent;
            font-size: 0.95rem;
            font-family: inherit;
            color: #0b1e33;
            outline: none;
        }

        .input-wrap input::placeholder {
            color: #8aafd0;
            font-weight: 400;
            font-size: 0.9rem;
        }

        .extra-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin: 0.2rem 0 1.6rem;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .extra-options label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #1a3d61;
            font-weight: 450;
            cursor: pointer;
            margin-bottom: 0;
        }

        .extra-options input[type="checkbox"] {
            accent-color: #2d7aff;
            width: 1rem;
            height: 1rem;
            cursor: pointer;
        }

        .extra-options a {
            color: #1a5bbf;
            text-decoration: none;
            font-weight: 500;
        }

        .extra-options a:hover {
            text-decoration: underline;
        }

        .btn-primary {
            background: #0a3470;
            color: white;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.9rem 1.8rem;
            border-radius: 80px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            box-shadow: 0 8px 18px -6px rgba(13, 61, 122, 0.35);
            margin-top: 0.3rem;
        }

        .btn-primary:hover {
            background: #104a8a;
            transform: scale(1.01);
            box-shadow: 0 10px 22px -6px #0a2d5a80;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 1.8rem 0 0.8rem;
            color: #5a8ab8;
            font-size: 0.8rem;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: #c6ddf5;
        }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 0.5rem;
        }

        .social-btn {
            background: #f2f8ff;
            border: 1px solid #c6ddf5;
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1a4b7a;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: default;
            transition: 0.1s;
            font-family: inherit;
        }

        .social-btn:hover {
            background: #e4effb;
            border-color: #8fb7e0;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
            font-size: 0.85rem;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #2d6aa0;
            text-decoration: none;
            font-weight: 450;
            border-bottom: 1px dashed transparent;
            transition: 0.1s;
        }

        .footer-links a:hover {
            border-bottom-color: #2d7aff;
            color: #0b2b4a;
        }

        #formFeedback {
            margin-top: 1.2rem;
            font-size: 0.9rem;
            text-align: center;
            min-height: 1.6rem;
            border-radius: 60px;
            padding: 0.3rem 0.8rem;
            display: none;
            font-weight: 500;
        }

        .redirect-notice {
            margin-top: 1rem;
            font-size: 0.8rem;
            text-align: center;
            color: #2d6aa0;
            background: #e9f2fe;
            padding: 0.3rem 0.8rem;
            border-radius: 60px;
            display: inline-block;
            width: 100%;
        }

        @media (max-width: 480px) {
            .card { padding: 1.8rem 1.2rem; }
            h1 { font-size: 1.7rem; }
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Nexus brand -->
    <div class="brand">
        <h1>
            <span>🔷</span> Nexus
            <span class="nexus-badge">login</span>
        </h1>
    </div>
    <div class="subhead">
        🔐 Welcome back · <i>sign in to your account</i>
    </div>

    <!-- Login form -->
    <form id="loginForm" onsubmit="return handleLogin(event)">
        <!-- Email / Username -->
        <div class="form-group">
            <label for="loginEmail">Email or username</label>
            <div class="input-wrap">
                <i>👤</i>
                <input type="text" id="loginEmail" placeholder="you@nexus.com or @handle" required />
            </div>
        </div>

        <!-- Password -->
        <div class="form-group">
            <label for="loginPassword">Password</label>
            <div class="input-wrap">
                <i>🔒</i>
                <input type="password" id="loginPassword" placeholder="••••••••" required />
            </div>
        </div>

        <!-- Remember me & Forgot password -->
        <div class="extra-options">
            <label>
                <input type="checkbox" id="rememberMe" /> Remember me
            </label>
            <a href="#" onclick="return false;">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary">
            <span>→</span> Sign in
        </button>
    </form>

    <!-- Divider & social -->
    <div class="divider">
        <span class="divider-line"></span>
        <span>or continue with</span>
        <span class="divider-line"></span>
    </div>
    <div class="social-row">
        <span class="social-btn"><i>🔵</i> Google</span>
        <span class="social-btn"><i>⚫</i> GitHub</span>
        <span class="social-btn"><i>🔷</i> Twitter</span>
    </div>

    <!-- Footer links -->
    <div class="footer-links">
        <a href="#" id="signUpLink">Create account</a>
        <a href="#" onclick="return false;">Help</a>
        <a href="#" onclick="return false;">Privacy</a>
    </div>

    <!-- feedback -->
    <div id="formFeedback"></div>

    <!-- redirect notice -->
    <div class="redirect-notice">
        ⏩ After login, you'll be redirected to the feed
    </div>
</div>

<script>
    // ===== REDIRECT TO FEED PAGE =====
    function redirectToFeed() {
        alert('✅ Login successful! Redirecting to your feed...');
        // Simulate a beautiful feed page (mock)
        const feedHTML = `
            <!DOCTYPE html>
            <html>
            <head>
                <title>Nexus · Feed</title>
                <style>
                    * { margin: 0; padding: 0; box-sizing: border-box; }
                    body {
                        font-family: 'Inter', sans-serif;
                        background: #f0f7ff;
                        padding: 2rem;
                        min-height: 100vh;
                    }
                    .feed-container {
                        max-width: 700px;
                        margin: 0 auto;
                    }
                    .feed-header {
                        background: white;
                        padding: 1.5rem 2rem;
                        border-radius: 30px;
                        box-shadow: 0 8px 24px -6px rgba(0,40,80,0.1);
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                        margin-bottom: 2rem;
                        border: 1px solid rgba(45, 122, 255, 0.15);
                    }
                    .feed-header h1 {
                        color: #0b2b4a;
                        font-size: 1.8rem;
                        display: flex;
                        align-items: center;
                        gap: 0.5rem;
                    }
                    .feed-header .badge {
                        background: #0d4a9e;
                        color: white;
                        padding: 0.2rem 0.8rem;
                        border-radius: 40px;
                        font-size: 0.7rem;
                        font-weight: 600;
                    }
                    .logout-btn {
                        background: #e9f2fe;
                        border: none;
                        padding: 0.5rem 1.2rem;
                        border-radius: 60px;
                        font-weight: 500;
                        color: #1a3d61;
                        cursor: pointer;
                        transition: 0.2s;
                    }
                    .logout-btn:hover {
                        background: #d4e6ff;
                    }
                    .post {
                        background: white;
                        padding: 1.5rem;
                        border-radius: 24px;
                        margin-bottom: 1.2rem;
                        box-shadow: 0 4px 12px rgba(0,40,80,0.06);
                        border: 1px solid rgba(45, 122, 255, 0.08);
                        transition: 0.2s;
                    }
                    .post:hover {
                        transform: translateY(-2px);
                        box-shadow: 0 8px 20px rgba(0,40,80,0.08);
                    }
                    .post .user {
                        display: flex;
                        align-items: center;
                        gap: 0.7rem;
                        margin-bottom: 0.6rem;
                    }
                    .post .avatar {
                        background: #2d7aff;
                        color: white;
                        width: 40px;
                        height: 40px;
                        border-radius: 50%;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        font-weight: 600;
                    }
                    .post .name {
                        font-weight: 600;
                        color: #0b2b4a;
                    }
                    .post .handle {
                        color: #5a8ab8;
                        font-size: 0.85rem;
                    }
                    .post .content {
                        color: #1a3d61;
                        line-height: 1.5;
                        margin-top: 0.3rem;
                    }
                    .post .meta {
                        display: flex;
                        gap: 1rem;
                        margin-top: 0.8rem;
                        color: #5a8ab8;
                        font-size: 0.8rem;
                    }
                    .post .meta span {
                        cursor: default;
                    }
                    .feed-footer {
                        text-align: center;
                        color: #5a8ab8;
                        font-size: 0.8rem;
                        margin-top: 2rem;
                    }
                </style>
            </head>
            <body>
                <div class="feed-container">
                    <div class="feed-header">
                        <h1>🔷 Nexus <span class="badge">feed</span></h1>
                        <button class="logout-btn" onclick="window.location.reload();">🚪 Sign out</button>
                    </div>

                    <div class="post">
                        <div class="user">
                            <div class="avatar">JD</div>
                            <div>
                                <div class="name">Jane Doe</div>
                                <div class="handle">@janedoe · 2h ago</div>
                            </div>
                        </div>
                        <div class="content">
                            Just launched a new project! Excited to share more with the Nexus community. 🚀
                        </div>
                        <div class="meta">
                            <span>❤️ 24</span>
                            <span>💬 8</span>
                            <span>🔁 3</span>
                        </div>
                    </div>

                    <div class="post">
                        <div class="user">
                            <div class="avatar" style="background: #1a7a4a;">AM</div>
                            <div>
                                <div class="name">Alex Morgan</div>
                                <div class="handle">@alexm · 5h ago</div>
                            </div>
                        </div>
                        <div class="content">
                            The new Nexus update is incredible! The blue theme looks amazing. 🌊
                        </div>
                        <div class="meta">
                            <span>❤️ 42</span>
                            <span>💬 15</span>
                            <span>🔁 7</span>
                        </div>
                    </div>

                    <div class="post">
                        <div class="user">
                            <div class="avatar" style="background: #b45a1a;">SR</div>
                            <div>
                                <div class="name">Sam Rivera</div>
                                <div class="handle">@samr · 1d ago</div>
                            </div>
                        </div>
                        <div class="content">
                            Working on a new feature for the feed. Stay tuned for updates! 💡
                        </div>
                        <div class="meta">
                            <span>❤️ 18</span>
                            <span>💬 6</span>
                            <span>🔁 2</span>
                        </div>
                    </div>

                    <div class="feed-footer">
                        ⚡ You're connected to the Nexus feed · demo content
                    </div>
                </div>
            </body>
            </html>
        `;
        document.open();
        document.write(feedHTML);
        document.close();
    }

    // ===== HANDLE LOGIN =====
    function handleLogin(event) {
        event.preventDefault();

        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const remember = document.getElementById('rememberMe').checked;
        const feedback = document.getElementById('formFeedback');

        feedback.style.display = 'block';
        feedback.style.background = '#e9f2fe';
        feedback.style.color = '#0b2b4a';

        // Simple validation
        if (!email || email.length < 2) {
            feedback.style.background = '#fee9e7';
            feedback.style.color = '#a1302a';
            feedback.textContent = '❌ Please enter your email or username.';
            return false;
        }

        if (!password || password.length < 1) {
            feedback.style.background = '#fee9e7';
            feedback.style.color = '#a1302a';
            feedback.textContent = '❌ Please enter your password.';
            return false;
        }

        // ✅ success — show feedback, then redirect to feed
        feedback.style.background = '#d4e6ff';
        feedback.style.color = '#08396e';
        feedback.textContent = `✅ Signed in successfully! Redirecting to feed...`;

        console.log('Nexus login:', { email, password: '[hidden]', remember });

        // Redirect after short delay
        setTimeout(redirectToFeed, 1200);

        return false;
    }

    // ===== "Create account" link → redirect to sign-up page =====
    document.getElementById('signUpLink').addEventListener('click', function(e) {
        e.preventDefault();
        alert('🔷 Redirecting to sign-up page...');
        // Simulate redirect to sign-up page (mock)
        const signupHTML = `
            <!DOCTYPE html>
            <html>
            <head><title>Nexus · Sign up</title>
            <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }
                body { font-family: 'Inter', sans-serif; background: #f0f7ff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 1.5rem; }
                .card { background: white; padding: 2.5rem; border-radius: 40px; box-shadow: 0 20px 40px -12px rgba(0,40,80,0.25); max-width: 440px; width: 100%; border: 1px solid rgba(45,122,255,0.15); }
                h1 { color: #0b2b4a; font-size: 2rem; display: flex; align-items: center; gap: 0.5rem; }
                .subhead { color: #1f4b7a; margin: 0.5rem 0 1.5rem; border-left: 4px solid #2d7aff; padding-left: 1rem; background: #e9f2fe; padding: 0.6rem 1rem; border-radius: 0 16px 16px 0; }
                input { width: 100%; padding: 0.9rem; margin: 0.4rem 0; border: 1.5px solid #c6ddf5; border-radius: 60px; font-size: 0.95rem; background: #f2f8ff; }
                button { background: #0a3470; color: white; border: none; padding: 0.9rem; border-radius: 60px; font-weight: 600; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 0.5rem; }
                .back-link { display: block; margin-top: 1.5rem; color: #2d6aa0; cursor: pointer; text-align: center; }
            </style>
            </head>
            <body>
                <div class="card">
                    <h1>🔷 Nexus <span style="font-size:0.7rem; background:#0d4a9e; color:white; padding:0.2rem 0.8rem; border-radius:40px;">sign up</span></h1>
                    <div class="subhead">⚡ Join the network · <i>blue & white</i></div>
                    <input type="text" placeholder="Username" />
                    <input type="email" placeholder="Email" />
                    <input type="password" placeholder="Password" />
                    <button>Create account</button>
                    <a href="#" onclick="window.location.reload();" class="back-link">← Back to login</a>
                    <p style="margin-top:1rem; font-size:0.8rem; color:#5a8ab8; text-align:center;">(demo sign-up — redirect works)</p>
                </div>
            </body>
            </html>
        `;
        document.open();
        document.write(signupHTML);
        document.close();
    });
</script>

<!-- Nexus login · redirects to a beautiful feed page -->
</body>
</html>
